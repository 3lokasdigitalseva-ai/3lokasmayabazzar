<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Thrilok Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-active { background: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="pb-24">
    <div class="sticky top-0 z-50 glass p-5 flex justify-between items-center border-b border-white/5">
        <h1 class="font-extrabold text-sm uppercase">Admin <span class="text-blue-500">Panel</span></h1>
        <button onclick="location.reload()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <div class="max-w-4xl mx-auto p-5 space-y-6">
        <nav class="flex p-2 glass rounded-3xl gap-2 sticky top-24 z-40 overflow-x-auto no-scrollbar">
            <button onclick="showS('p')" id="btn-p" class="tab-active px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Inventory</button>
            <button onclick="showS('o')" id="btn-o" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Orders</button>
            <button onclick="showS('b')" id="btn-b" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Banners</button>
            <button onclick="showS('n')" id="btn-n" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase text-blue-400">Push Alert</button>
            <button onclick="showS('s')" id="btn-s" class="px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Setup</button>
        </nav>

        <section id="sec-n" class="hidden glass p-8 rounded-[2.5rem] space-y-4 border border-blue-500/20">
            <h2 class="text-lg font-black uppercase italic">Broadcast <span class="text-blue-500">Push</span></h2>
            <input id="push-t" placeholder="Title" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
            <textarea id="push-m" placeholder="Message..." class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none h-24"></textarea>
            <button onclick="sendPush()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase">Send Now 🚀</button>
        </section>

        <section id="sec-p"> <div id="p-list" class="grid gap-4"></div> </section>
        <section id="sec-o" class="hidden"> <div id="ord-list" class="space-y-4"></div> </section>
        <section id="sec-b" class="hidden"> <div id="b-list" class="grid gap-3"></div> </section>
        <section id="sec-s" class="hidden"> </section>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAwmqZpgzAsdwIURspaXeETp20ARbBR8lg", authDomain: "thtilok-store.firebaseapp.com", projectId: "thtilok-store" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function showS(s) {
            document.querySelectorAll('section').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(x => x.classList.remove('tab-active'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            document.getElementById('btn-'+s).classList.add('tab-active');
        }

        async function sendPush() {
            const t = document.getElementById('push-t').value;
            const m = document.getElementById('push-m').value;
            if(!t || !m) return alert("Fill all fields");
            await db.collection('notifications').add({ title: t, body: m, time: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Sent! 🚀");
        }
        
        // Products load ikkada restore chey
        db.collection('products').onSnapshot(s => {
            document.getElementById('p-list').innerHTML = s.docs.map(d => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase">${d.data().name}</span>
                    <button onclick="db.collection('products').doc('${d.id}').delete()" class="text-red-500">Delete</button>
                </div>`).join('');
        });
    </script>
</body>
</html>
