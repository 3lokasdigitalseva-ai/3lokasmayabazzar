<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrilok Hub | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 glass p-5 flex justify-between items-center border-b border-white/5">
        <h1 class="font-extrabold text-sm uppercase italic">Admin <span class="text-blue-500">Panel</span></h1>
        <button onclick="location.reload()" class="bg-white/5 w-10 h-10 rounded-full flex items-center justify-center border border-white/10">
            <i class="fa-solid fa-rotate-right text-xs"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto p-5 space-y-8">
        <nav class="flex p-2 glass rounded-3xl gap-2 sticky top-24 z-40 overflow-x-auto no-scrollbar">
            <button onclick="showS('p')" id="btn-p" class="tab-active flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Inventory</button>
            <button onclick="showS('b')" id="btn-b" class="flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Banners</button>
            <button onclick="showS('s')" id="btn-s" class="flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap">Setup</button>
            <button onclick="showS('n')" id="btn-n" class="flex-1 py-4 px-6 rounded-2xl text-[10px] font-black uppercase whitespace-nowrap text-blue-400">Push</button>
        </nav>

        <section id="sec-p" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem] space-y-4">
                <input id="p-n" placeholder="Product Name" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <input id="p-pr" type="number" placeholder="Price (₹)" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <input id="p-i1" placeholder="Image URL" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <button onclick="saveP()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Add Product</button>
            </div>
            <div id="p-list" class="grid gap-4"></div>
        </section>

        <section id="sec-b" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2.5rem] space-y-4">
                <input id="b-url" placeholder="Banner Image URL" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <button onclick="addB()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase tracking-widest active:scale-95 transition-all">Add Banner</button>
            </div>
            <div id="b-list" class="grid gap-4"></div>
        </section>

        <section id="sec-s" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2.5rem] space-y-4">
                <h3 class="text-xs font-black uppercase">Store & Payment</h3>
                <input id="s-upi" placeholder="UPI ID (e.g. name@apl)" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <button onclick="updateSettings()" class="w-full bg-green-600 py-5 rounded-[2rem] font-black uppercase tracking-widest">Update UPI</button>
                
                <h3 class="text-xs font-black uppercase mt-6">Security Credentials</h3>
                <input id="adm-p" placeholder="New Admin Password" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <button onclick="updateAdm()" class="w-full bg-red-600 py-5 rounded-[2rem] font-black uppercase tracking-widest">Update Password</button>
            </div>
        </section>

        <section id="sec-n" class="hidden space-y-6">
            <div class="glass p-8 rounded-[2.5rem] space-y-4 border-blue-500/20">
                <h2 class="text-lg font-black italic uppercase">Push <span class="text-blue-500">Alert</span></h2>
                <input id="n-t" placeholder="Notification Title" class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none">
                <textarea id="n-b" placeholder="Message Body..." class="w-full p-4 rounded-2xl bg-black/40 border border-white/10 outline-none h-24"></textarea>
                <button onclick="sendPush()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase tracking-widest active:scale-95 transition-all">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Broadcast Now
                </button>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAwmqZpgzAsdwIURspaXeETp20ARbBR8lg", 
            authDomain: "thtilok-store.firebaseapp.com", 
            projectId: "thtilok-store",
            messagingSenderId: "215927517073" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showS(s) {
            document.querySelectorAll('section').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(x => x.classList.remove('tab-active'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            document.getElementById('btn-'+s).classList.add('tab-active');
        }

        // Functions (Products, Banners, Setup from your original code)
        async function saveP() {
            const n = document.getElementById('p-n').value;
            const p = document.getElementById('p-pr').value;
            const i = document.getElementById('p-i1').value;
            if(!n || !p) return;
            await db.collection('products').add({ name: n, price: p, img1: i });
            alert("Added!");
        }

        async function addB() {
            const url = document.getElementById('b-url').value;
            if(url) await db.collection('banners').add({url});
            alert("Banner Added!");
        }

        async function updateSettings() {
            const upi = document.getElementById('s-upi').value;
            await db.collection('settings').doc('store').set({upi}, {merge: true});
            alert("UPI Updated!");
        }

        async function updateAdm() {
            const pass = document.getElementById('adm-p').value;
            await db.collection('users').doc('7989227696').update({pass});
            alert("Password Updated!");
        }

        // New Push Function
        async function sendPush() {
            const t = document.getElementById('n-t').value;
            const b = document.getElementById('n-b').value;
            if(!t || !b) return alert("Fill all!");
            await db.collection('notifications').add({ title: t, body: b, time: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Notification Sent Successfully! 🚀");
        }

        // Live Product List for Delete
        db.collection('products').onSnapshot(s => {
            document.getElementById('p-list').innerHTML = s.docs.map(d => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center italic text-[10px] font-black uppercase">
                    <span>${d.data().name} - ₹${d.data().price}</span>
                    <button onclick="db.collection('products').doc('${d.id}').delete()" class="text-red-500">Delete</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
