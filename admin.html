<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrilok Hub | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5); }
        input, select, textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus { border-color: #3b82f6 !important; outline: none; }
        .order-card { transition: all 0.3s ease; }
        .order-card:hover { border-color: rgba(59, 130, 246, 0.3); transform: translateY(-2px); }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 glass p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-sm tracking-tighter uppercase italic">Admin <span class="text-blue-500">Panel</span></h1>
                <p class="text-[8px] opacity-40 font-bold uppercase tracking-[0.2em]">Management Console</p>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-white/5 w-10 h-10 rounded-full flex items-center justify-center border border-white/10 hover:bg-white/10">
            <i class="fa-solid fa-rotate-right text-xs"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto p-5 space-y-8">
        
        <div class="grid grid-cols-3 gap-4" id="stats-grid">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[9px] font-bold opacity-40 uppercase">Total Orders</p>
                <h3 id="stat-orders" class="text-xl font-black mt-1">0</h3>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500">
                <p class="text-[9px] font-bold opacity-40 uppercase">Products</p>
                <h3 id="stat-products" class="text-xl font-black mt-1">0</h3>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-amber-500">
                <p class="text-[9px] font-bold opacity-40 uppercase">Revenue</p>
                <h3 id="stat-rev" class="text-xl font-black mt-1">₹0</h3>
            </div>
        </div>

        <nav class="flex p-2 glass rounded-3xl gap-2 sticky top-24 z-40">
            <button onclick="showSection('p')" id="btn-p" class="tab-active flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Products</button>
            <button onclick="showSection('o')" id="btn-o" class="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Orders</button>
            <button onclick="showSection('s')" id="btn-s" class="flex-1 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Setup</button>
        </nav>

        <section id="sec-p" class="space-y-6">
            <div class="glass p-8 rounded-[2.5rem] space-y-5 shadow-2xl">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-black italic uppercase">Add / Edit <span class="text-blue-500">Product</span></h2>
                    <button onclick="resetP()" class="text-[10px] font-bold opacity-40 hover:opacity-100">CLEAR FORM</button>
                </div>
                
                <input id="p-id" type="hidden">
                <input id="p-n" placeholder="Product Title (e.g. Premium T-Shirt)" class="w-full p-4 rounded-2xl outline-none">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-2">PRICE (₹)</label>
                        <input id="p-pr" type="number" placeholder="999" class="w-full p-4 rounded-2xl outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-2">STOCK QTY</label>
                        <input id="p-q" type="number" placeholder="50" class="w-full p-4 rounded-2xl outline-none">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] font-bold opacity-40 ml-2">IMAGE URLS (PRIMARY + 2 EXTRA)</label>
                    <input id="p-i1" placeholder="Main Image URL" class="w-full p-4 rounded-2xl outline-none mb-2">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="p-i2" placeholder="Image 2" class="w-full p-4 rounded-2xl outline-none">
                        <input id="p-i3" placeholder="Image 3" class="w-full p-4 rounded-2xl outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-2">SIZES (Comma Separated)</label>
                        <input id="p-sz" placeholder="S, M, L, XL" class="w-full p-4 rounded-2xl outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-2">COLORS (Comma Separated)</label>
                        <input id="p-cl" placeholder="Black, White, Blue" class="w-full p-4 rounded-2xl outline-none">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[9px] font-bold opacity-40 ml-2">PRODUCT CATEGORY</label>
                    <select id="p-c" class="w-full p-4 rounded-2xl outline-none appearance-none">
                        <option value="Electronics">Electronics</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Smartphones">Smartphones</option>
                        <option value="Footwear">Footwear</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Home Decor">Home Decor</option>
                        <option value="Gadgets">Gadgets</option>
                    </select>
                </div>

                <button onclick="saveP()" class="w-full bg-blue-600 py-5 rounded-[2rem] font-black uppercase tracking-widest shadow-xl shadow-blue-600/20 active:scale-95 transition-all">
                    Push to Live Store
                </button>
            </div>

            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase opacity-30 tracking-[0.3em] ml-2">Inventory List</h3>
                <div id="p-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="sec-o" class="hidden space-y-6">
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <button onclick="loadO('All')" class="bg-white/5 px-6 py-3 rounded-xl text-[10px] font-bold border border-white/5 whitespace-nowrap">All Orders</button>
                <button onclick="loadO('Pending')" class="bg-amber-500/10 text-amber-500 px-6 py-3 rounded-xl text-[10px] font-bold border border-amber-500/20 whitespace-nowrap">Pending</button>
                <button onclick="loadO('Accepted')" class="bg-emerald-500/10 text-emerald-500 px-6 py-3 rounded-xl text-[10px] font-bold border border-emerald-500/20 whitespace-nowrap">Accepted</button>
                <button onclick="loadO('Cancelled')" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-xl text-[10px] font-bold border border-red-500/20 whitespace-nowrap">Cancelled</button>
            </div>
            <div id="ord-list" class="space-y-4"></div>
        </section>

        <section id="sec-s" class="hidden space-y-8">
            <div class="glass p-8 rounded-[2.5rem] space-y-6">
                <h2 class="text-lg font-black italic uppercase">Store <span class="text-amber-500">Settings</span></h2>
                <div class="space-y-4">
                    <input id="s-name" placeholder="Store Name (e.g. Thrilok Hub)" class="w-full p-4 rounded-2xl outline-none">
                    <input id="s-upi" placeholder="Your UPI ID (e.g. user@ybl)" class="w-full p-4 rounded-2xl outline-none">
                    <button onclick="saveS()" class="w-full bg-emerald-600 py-4 rounded-2xl font-black uppercase tracking-widest">Update Store Profile</button>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem] space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-black italic uppercase">Home <span class="text-blue-500">Banners</span></h2>
                    <span class="text-[9px] opacity-40 font-bold">MAX 5</span>
                </div>
                <div class="flex gap-2">
                    <input id="b-url" placeholder="Paste Image URL" class="flex-1 p-4 rounded-2xl outline-none">
                    <button onclick="addB()" class="bg-blue-600 px-8 rounded-2xl font-black uppercase text-[10px]">Add</button>
                </div>
                <div id="b-list" class="grid gap-3 mt-4"></div>
            </div>

            <div class="bg-red-500/10 p-8 rounded-[2.5rem] space-y-4 border border-red-500/20">
                <h2 class="text-lg font-black italic uppercase text-red-500">Security</h2>
                <p class="text-[10px] opacity-60">Update Admin mobile password for 7989227696</p>
                <input id="adm-p" placeholder="Enter New Password" class="w-full p-4 rounded-2xl outline-none bg-black/40">
                <button onclick="updateAdm()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase tracking-widest">Update Security</button>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAwmqZpgzAsdwIURspaXeETp20ARbBR8lg", authDomain: "thtilok-store.firebaseapp.com", projectId: "thtilok-store" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function showSection(s) {
            document.querySelectorAll('section').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(x => x.classList.remove('tab-active'));
            document.getElementById('sec-'+s).classList.remove('hidden');
            document.getElementById('btn-'+s).classList.add('tab-active');
            if(s==='p') loadP(); if(s==='o') loadO('All'); if(s==='s') loadS();
        }

        async function saveP() {
            const id = document.getElementById('p-id').value;
            const data = {
                name: document.getElementById('p-n').value,
                price: document.getElementById('p-pr').value,
                img1: document.getElementById('p-i1').value,
                img2: document.getElementById('p-i2').value,
                img3: document.getElementById('p-i3').value,
                stock: parseInt(document.getElementById('p-q').value) || 0,
                sizes: document.getElementById('p-sz').value,
                colors: document.getElementById('p-cl').value,
                category: document.getElementById('p-c').value,
                updated: Date.now()
            };
            if(!data.name || !data.price) return alert("Basics like Name & Price are required!");
            
            if(id) await db.collection('products').doc(id).update(data);
            else await db.collection('products').add(data);
            
            alert("Inventory Synchronized! ✅");
            resetP(); loadP(); updateStats();
        }

        function loadP() {
            db.collection('products').onSnapshot(snap => {
                document.getElementById('stat-products').innerText = snap.size;
                document.getElementById('p-list').innerHTML = snap.docs.map(doc => `
                <div class="glass p-5 rounded-[2rem] flex gap-4 items-center border border-white/5">
                    <img src="${doc.data().img1}" class="w-20 h-20 object-cover rounded-2xl shadow-lg">
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-black text-xs uppercase truncate">${doc.data().name}</h4>
                        <p class="text-blue-500 font-bold text-[10px] mt-1">₹${doc.data().price} • Stock: ${doc.data().stock}</p>
                        <div class="flex gap-4 mt-3">
                            <button onclick="editP('${doc.id}')" class="text-[9px] font-black text-blue-400 uppercase tracking-widest">Edit</button>
                            <button onclick="delP('${doc.id}')" class="text-[9px] font-black text-red-500 uppercase tracking-widest">Delete</button>
                        </div>
                    </div>
                </div>`).join('');
            });
        }

        async function editP(id) {
            const d = (await db.collection('products').doc(id).get()).data();
            document.getElementById('p-id').value = id;
            document.getElementById('p-n').value = d.name;
            document.getElementById('p-pr').value = d.price;
            document.getElementById('p-i1').value = d.img1;
            document.getElementById('p-i2').value = d.img2;
            document.getElementById('p-i3').value = d.img3;
            document.getElementById('p-q').value = d.stock;
            document.getElementById('p-sz').value = d.sizes;
            document.getElementById('p-cl').value = d.colors;
            document.getElementById('p-c').value = d.category;
            window.scrollTo({top: 150, behavior: 'smooth'});
        }

        function delP(id) { if(confirm("Permanently remove this product?")) db.collection('products').doc(id).delete(); }
        function resetP() { document.getElementById('p-id').value = ""; document.querySelectorAll('#sec-p input').forEach(i => i.value = ""); }

        function loadO(filter) {
            db.collection('orders').onSnapshot(snap => {
                let list = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                list.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));
                
                document.getElementById('stat-orders').innerText = snap.size;
                let rev = 0; list.forEach(o => { if(o.status === 'Accepted') rev += parseInt(o.price || 0); });
                document.getElementById('stat-rev').innerText = '₹' + rev;

                if(filter !== 'All') list = list.filter(o => o.status === filter);
                
                document.getElementById('ord-list').innerHTML = list.map(o => `
                <div class="glass p-6 rounded-[2.5rem] space-y-4 border border-white/5 order-card shadow-xl">
                    <div class="flex justify-between items-center">
                        <div class="flex gap-3 items-center">
                            <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center font-black text-[10px] text-blue-500">#</div>
                            <div>
                                <h4 class="font-black text-xs uppercase italic">${o.product}</h4>
                                <p class="text-[9px] opacity-30 font-bold uppercase tracking-widest">${o.payMethod} • ₹${o.price}</p>
                            </div>
                        </div>
                        <span class="text-[9px] font-black uppercase px-4 py-1.5 rounded-full ${o.status==='Cancelled'?'bg-red-500/10 text-red-500':'bg-blue-500/10 text-blue-500'} border border-current/20">${o.status}</span>
                    </div>
                    
                    <div class="bg-black/40 p-5 rounded-[1.5rem] space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-white/80 uppercase tracking-tighter">${o.customer.n}</span>
                            <a href="tel:${o.customer.p}" class="text-[10px] font-black text-blue-400 underline">${o.customer.p}</a>
                        </div>
                        <p class="text-[10px] opacity-50 font-medium leading-relaxed">${o.customer.a}</p>
                        <div class="pt-2 flex justify-between border-t border-white/5 mt-2">
                            <span class="text-[9px] font-bold text-amber-500 uppercase">UTR: ${o.utr}</span>
                            <span class="text-[9px] font-bold text-white opacity-40 uppercase">S: ${o.size} | C: ${o.color}</span>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-2">
                        ${o.status==='Pending' ? `
                            <button onclick="updO('${o.id}', 'Accepted')" class="flex-1 bg-emerald-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-emerald-600/20">Accept</button>
                            <button onclick="updO('${o.id}', 'Cancelled')" class="flex-1 bg-red-600/10 text-red-500 border border-red-500/20 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Reject</button>
                        ` : `
                            <button onclick="delO('${o.id}')" class="w-full bg-white/5 py-3 rounded-xl text-[9px] font-bold opacity-30 uppercase">Archive Order</button>
                        `}
                    </div>
                </div>`).join('');
            });
        }

        async function updO(id, s) { await db.collection('orders').doc(id).update({status: s}); }
        async function delO(id) { if(confirm("Archive this record?")) await db.collection('orders').doc(id).delete(); }

        async function saveS() { 
            await db.collection('settings').doc('app').set({ name: document.getElementById('s-name').value, upi: document.getElementById('s-upi').value }); 
            alert("Store Identity Updated! 🏪"); 
        }

        async function loadS() { 
            const s = await db.collection('settings').doc('app').get(); 
            if(s.exists) { 
                document.getElementById('s-name').value = s.data().name; 
                document.getElementById('s-upi').value = s.data().upi; 
            }
            db.collection('banners').onSnapshot(snap => { 
                document.getElementById('b-list').innerHTML = snap.docs.map(doc => `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                        <img src="${doc.data().url}" class="h-10 w-16 object-cover rounded-lg">
                        <button onclick="db.collection('banners').doc('${doc.id}').delete()" class="text-red-500 text-[10px] font-black uppercase">Remove</button>
                    </div>`).join(''); 
            });
        }

        async function addB() { 
            const url = document.getElementById('b-url').value;
            if(!url) return;
            const snap = await db.collection('banners').get(); 
            if(snap.size < 5) { 
                await db.collection('banners').add({url: url}); 
                document.getElementById('b-url').value = ""; 
            } else alert("Max 5 Banners only!"); 
        }

        async function updateAdm() { 
            const p = document.getElementById('adm-p').value; 
            if(p) { 
                await db.collection('users').doc('7989227696').update({pass: p}); 
                alert("Security Credentials Updated! 🔐"); 
                document.getElementById('adm-p').value = "";
            } 
        }

        showSection('p');
    </script>
</body>
</html>
