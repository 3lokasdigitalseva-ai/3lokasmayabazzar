<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thrilok Hub | Smart Service Card</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e73c7e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        /* BANNER SLIDER */
        .banner-box {
            width: 100%; height: 160px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .banner-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .banner-slide { min-width: 100%; height: 100%; object-fit: cover; }

        .profile-img {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin: -70px auto 15px auto;
            position: relative;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 18px;
            display: flex; align-items: center;
            color: #fff; font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-link:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.3); }
        .btn-link i { font-size: 20px; width: 35px; }

        /* PWA Banner */
        #pwa-prompt {
            display: none; position: fixed; top: 20px; left: 20px; right: 20px;
            background: #fff; border-radius: 20px; padding: 15px;
            z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            justify-content: space-between; align-items: center;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="pwa-prompt" class="flex">
        <div class="flex items-center gap-3 text-black">
            <div class="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center text-white font-bold">T</div>
            <div class="text-xs font-bold uppercase">Add to Home Screen</div>
        </div>
        <button id="install-btn" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase">Install</button>
    </div>

    <div class="glass-card">
        <div class="banner-box">
            <div class="banner-wrapper" id="bannerWrapper">
                <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000" class="banner-slide">
                <img src="https://images.unsplash.com/photo-1557821552-17105176677c?q=80&w=1000" class="banner-slide">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1000" class="banner-slide">
            </div>
        </div>

        <img src="https://i.imgur.com/26pw27Y.png" class="profile-img">
        
        <h2 class="text-white text-2xl font-extrabold italic uppercase tracking-tighter">Thrilok Hub</h2>
        <p class="text-white/70 text-[10px] font-bold uppercase tracking-widest mb-8">Premium Digital Services</p>

        <div class="space-y-4">
            <a href="https://thrilokstore.pages.dev/" class="btn-link">
                <i class="fas fa-shopping-bag text-yellow-400"></i> <span>Main Store</span>
            </a>
            <a href="#" class="btn-link">
                <i class="fas fa-bolt text-blue-400"></i> <span>Instant Services</span>
            </a>
            <a href="https://wa.me/917989227698" class="btn-link">
                <i class="fab fa-whatsapp text-green-400"></i> <span>Contact Support</span>
            </a>
        </div>

        <p class="mt-8 text-white/30 text-[8px] font-bold uppercase">© 2026 Thrilok Digital Hub</p>
    </div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "thtilok-store.firebaseapp.com",
            projectId: "thtilok-store",
            messagingSenderId: "215927517073",
            appId: "1:215927517073:web:dc324c3ca380d0912ab430"
        };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // 2. Push Notification & VAPID Key
        function initNotifications() {
            messaging.getToken({ 
                vapidKey: 'BKKzCeY5KKO1RMzu76tElEyf2XevygxORO3VcR-DxZU2lWbiiGpwbRcJNKKkGEY2oMkbOalarqufu_l6WRsg_Bs' // <--- NEE VAPID ID IKKADA PETTU
            }).then((token) => {
                if (token) {
                    console.log("Token:", token);
                    // Automatic ga 'all_users' topic ki subscribe cheyyochanmaata
                }
            }).catch((err) => console.log('Permission denied', err));
        }

        // 3. Banner Auto Slide
        let bIndex = 0;
        const bWrapper = document.getElementById('bannerWrapper');
        const bSlides = document.querySelectorAll('.banner-slide');
        
        setInterval(() => {
            bIndex = (bIndex + 1) % bSlides.length;
            bWrapper.style.transform = `translateX(-${bIndex * 100}%)`;
        }, 4000);

        // 4. PWA Logic (Add to Home Screen)
        let defPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            defPrompt = e;
            document.getElementById('pwa-prompt').style.display = 'flex';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (defPrompt) {
                defPrompt.prompt();
                const { outcome } = await defPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('pwa-prompt').style.display = 'none';
                defPrompt = null;
            }
        });

        // 5. Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/firebase-messaging-sw.js')
                .then(() => initNotifications());
            });
        }
    </script>
</body>
</html>
